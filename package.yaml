name:                CI4251
version:             0.1.0.0
github:              "githubuser/CI4251"
license:             BSD-3-Clause
author:              "Author name here"
maintainer:          "example@example.com"
copyright:           "2026 Author name here"

extra-source-files:
- README.md
- CHANGELOG.md

# Metadata used when publishing your package
# synopsis:            Short description of your package
# category:            Web

# To avoid duplicated efforts in documentation and dealing with the
# complications of embedding Haddock markup inside cabal files, it is
# common to point users to the README.md file.
description:         Please see the README on GitHub at <https://github.com/githubuser/CI4251#readme>

dependencies:
- base >= 4.7 && < 5
- containers
- transformers
- mtl
- random
- bluefin
- polysemy
- parsec
- lens
- logict
- free
- recursion-schemes
- stm
- fgl
- opaleye
- esqueleto
- QuickCheck
- hspec

ghc-options:
- -Wall
- -Wcompat
- -Widentities
- -Wincomplete-record-updates
- -Wincomplete-uni-patterns
- -Wmissing-export-lists
- -Wmissing-home-modules
- -Wpartial-fields
- -Wredundant-constraints

library:
  source-dirs: src

default-extensions:
  - ScopedTypeVariables
  - TypeApplications
  - TypeAbstractions
  - LambdaCase
  - TupleSections
  - FlexibleInstances
  - MultiParamTypeClasses
  - ImportQualifiedPost
  - InstanceSigs
  - KindSignatures

executables:
  CI4251-exe:
    main:                Main.hs
    source-dirs:         app
    ghc-options:
    - -threaded
    - -rtsopts
    - -with-rtsopts=-N
    dependencies:
    - CI4251

tests:
  CI4251-test:
    main:                Spec.hs
    source-dirs:         test
    ghc-options:
    - -threaded
    - -rtsopts
    - -with-rtsopts=-N
    dependencies:
    - CI4251
